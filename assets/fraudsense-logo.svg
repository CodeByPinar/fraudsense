<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D9E75;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F6E56;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="200" cy="200" r="172" fill="none" stroke="#1D9E75" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Shield shape -->
  <path d="M200 80 L290 118 L290 195 C290 248 252 290 200 310 C148 290 110 248 110 195 L110 118 Z"
        fill="url(#shieldGrad)" opacity="0.15"/>
  <path d="M200 80 L290 118 L290 195 C290 248 252 290 200 310 C148 290 110 248 110 195 L110 118 Z"
        fill="none" stroke="#1D9E75" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Inner shield highlight -->
  <path d="M200 96 L278 129 L278 193 C278 240 244 278 200 296 C156 278 122 240 122 193 L122 129 Z"
        fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Lightning bolt / scan line inside shield -->
  <polyline points="185,155 205,185 190,185 215,225"
            fill="none" stroke="#1D9E75" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Scan dots -->
  <circle cx="160" cy="170" r="3" fill="#1D9E75" opacity="0.6"/>
  <circle cx="240" cy="170" r="3" fill="#1D9E75" opacity="0.6"/>
  <circle cx="155" cy="210" r="2" fill="#1D9E75" opacity="0.4"/>
  <circle cx="245" cy="210" r="2" fill="#1D9E75" opacity="0.4"/>

  <!-- Horizontal scan line -->
  <line x1="122" y1="190" x2="278" y2="190" stroke="#1D9E75" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="4,6"/>

  <!-- Corner brackets -->
  <path d="M130 155 L130 145 L140 145" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-opacity="0.5"/>
  <path d="M270 155 L270 145 L260 145" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- Small circuit dots around -->
  <circle cx="200" cy="52" r="2.5" fill="#1D9E75" opacity="0.4"/>
  <circle cx="200" cy="348" r="2.5" fill="#1D9E75" opacity="0.4"/>
  <circle cx="52" cy="200" r="2.5" fill="#1D9E75" opacity="0.4"/>
  <circle cx="348" cy="200" r="2.5" fill="#1D9E75" opacity="0.4"/>

  <circle cx="148" cy="65" r="1.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="252" cy="65" r="1.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="148" cy="335" r="1.8" fill="#1D9E75" opacity="0.3"/>
  <circle cx="252" cy="335" r="1.8" fill="#1D9E75" opacity="0.3"/>
</svg>
