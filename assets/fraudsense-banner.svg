<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A"/>
      <stop offset="50%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D9E75"/>
      <stop offset="100%" style="stop-color:#5DCAA5"/>
    </linearGradient>
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D9E75;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0F6E56;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="1280" height="640"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g clip-path="url(#clip)" opacity="0.04">
    <g stroke="#1D9E75" stroke-width="0.5">
      <!-- Vertical lines -->
      <line x1="80" y1="0" x2="80" y2="640"/>
      <line x1="160" y1="0" x2="160" y2="640"/>
      <line x1="240" y1="0" x2="240" y2="640"/>
      <line x1="320" y1="0" x2="320" y2="640"/>
      <line x1="400" y1="0" x2="400" y2="640"/>
      <line x1="480" y1="0" x2="480" y2="640"/>
      <line x1="560" y1="0" x2="560" y2="640"/>
      <line x1="640" y1="0" x2="640" y2="640"/>
      <line x1="720" y1="0" x2="720" y2="640"/>
      <line x1="800" y1="0" x2="800" y2="640"/>
      <line x1="880" y1="0" x2="880" y2="640"/>
      <line x1="960" y1="0" x2="960" y2="640"/>
      <line x1="1040" y1="0" x2="1040" y2="640"/>
      <line x1="1120" y1="0" x2="1120" y2="640"/>
      <line x1="1200" y1="0" x2="1200" y2="640"/>
      <!-- Horizontal lines -->
      <line x1="0" y1="80" x2="1280" y2="80"/>
      <line x1="0" y1="160" x2="1280" y2="160"/>
      <line x1="0" y1="240" x2="1280" y2="240"/>
      <line x1="0" y1="320" x2="1280" y2="320"/>
      <line x1="0" y1="400" x2="1280" y2="400"/>
      <line x1="0" y1="480" x2="1280" y2="480"/>
      <line x1="0" y1="560" x2="1280" y2="560"/>
    </g>
  </g>

  <!-- Glow orb left -->
  <circle cx="200" cy="320" r="300" fill="#1D9E75" opacity="0.04" filter="url(#softglow)"/>
  <!-- Glow orb right -->
  <circle cx="1050" cy="320" r="250" fill="#1D9E75" opacity="0.05" filter="url(#softglow)"/>

  <!-- ── LOGO SHIELD (left side) ── -->
  <g transform="translate(140, 120)">
    <!-- Shield fill -->
    <path d="M160 0 L300 58 L300 195 C300 285 238 355 160 385 C82 355 20 285 20 195 L20 58 Z"
          fill="url(#shieldG)"/>
    <!-- Shield outline -->
    <path d="M160 0 L300 58 L300 195 C300 285 238 355 160 385 C82 355 20 285 20 195 L20 58 Z"
          fill="none" stroke="#1D9E75" stroke-width="2.5" filter="url(#glow)"/>
    <!-- Inner shield -->
    <path d="M160 22 L278 72 L278 193 C278 272 222 334 160 360 C98 334 42 272 42 193 L42 72 Z"
          fill="none" stroke="#1D9E75" stroke-width="0.8" stroke-opacity="0.35"/>

    <!-- Lightning bolt -->
    <polyline points="145,120 168,170 150,170 178,230"
              fill="none" stroke="url(#tealGrad)" stroke-width="6"
              stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Scan line -->
    <line x1="42" y1="192" x2="278" y2="192" stroke="#1D9E75" stroke-width="1"
          stroke-opacity="0.25" stroke-dasharray="6,8"/>

    <!-- Corner brackets -->
    <path d="M50 145 L50 130 L65 130" fill="none" stroke="#1D9E75" stroke-width="2" stroke-opacity="0.6"/>
    <path d="M270 145 L270 130 L255 130" fill="none" stroke="#1D9E75" stroke-width="2" stroke-opacity="0.6"/>
    <path d="M50 240 L50 255 L65 255" fill="none" stroke="#1D9E75" stroke-width="2" stroke-opacity="0.6"/>
    <path d="M270 240 L270 255 L255 255" fill="none" stroke="#1D9E75" stroke-width="2" stroke-opacity="0.6"/>

    <!-- Scan dots -->
    <circle cx="90" cy="160" r="3.5" fill="#1D9E75" opacity="0.5"/>
    <circle cx="230" cy="160" r="3.5" fill="#1D9E75" opacity="0.5"/>
    <circle cx="80"  cy="220" r="2.5" fill="#1D9E75" opacity="0.35"/>
    <circle cx="240" cy="220" r="2.5" fill="#1D9E75" opacity="0.35"/>
  </g>

  <!-- ── DIVIDER LINE ── -->
  <line x1="520" y1="160" x2="520" y2="480" stroke="#1D9E75" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- ── TEXT SECTION (right side) ── -->

  <!-- Tag line above -->
  <text x="580" y="195" font-family="'Courier New', monospace" font-size="14"
        fill="#1D9E75" opacity="0.8" letter-spacing="4">REAL-TIME FRAUD DETECTION MICROSERVICE</text>

  <!-- Main title -->
  <text x="576" y="300" font-family="Arial, sans-serif" font-size="96"
        font-weight="700" fill="white" letter-spacing="-2">Fraud</text>
  <text x="576" y="300" font-family="Arial, sans-serif" font-size="96"
        font-weight="700" fill="url(#tealGrad)" letter-spacing="-2">
    <tspan dx="330">Sense</tspan>
  </text>

  <!-- Subtitle -->
  <text x="580" y="355" font-family="Arial, sans-serif" font-size="18"
        fill="#AAAAAA" letter-spacing="0.5">Node.js · TypeScript · PostgreSQL · Redis · Elasticsearch</text>

  <!-- Divider -->
  <line x1="580" y1="385" x2="1150" y2="385" stroke="#1D9E75" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="600" y="425" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1D9E75">&lt;40ms</text>
  <text x="600" y="448" font-family="Arial, sans-serif" font-size="12" fill="#666666">p99 latency</text>

  <!-- Stat 2 -->
  <text x="755" y="425" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1D9E75">97%+</text>
  <text x="755" y="448" font-family="Arial, sans-serif" font-size="12" fill="#666666">accuracy</text>

  <!-- Stat 3 -->
  <text x="895" y="425" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1D9E75">8k/s</text>
  <text x="895" y="448" font-family="Arial, sans-serif" font-size="12" fill="#666666">throughput</text>

  <!-- Stat 4 -->
  <text x="1015" y="425" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1D9E75">85%+</text>
  <text x="1015" y="448" font-family="Arial, sans-serif" font-size="12" fill="#666666">test coverage</text>

  <!-- Divider 2 -->
  <line x1="580" y1="470" x2="1150" y2="470" stroke="#1D9E75" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- GitHub -->
  <text x="580" y="500" font-family="'Courier New', monospace" font-size="13"
        fill="#1D9E75" opacity="0.6">github.com/CodeByPinar/fraudsense</text>

  <!-- Author -->
  <text x="1150" y="500" font-family="Arial, sans-serif" font-size="13"
        fill="#555555" text-anchor="end">by Pınar Topuz</text>

  <!-- Top-left corner decoration -->
  <path d="M0 0 L60 0 L60 4 L4 4 L4 60 L0 60 Z" fill="#1D9E75" opacity="0.25"/>
  <!-- Bottom-right corner decoration -->
  <path d="M1280 640 L1220 640 L1220 636 L1276 636 L1276 580 L1280 580 Z" fill="#1D9E75" opacity="0.25"/>

  <!-- Floating dots decoration -->
  <circle cx="1180" cy="100" r="2" fill="#1D9E75" opacity="0.3"/>
  <circle cx="1200" cy="120" r="1.5" fill="#1D9E75" opacity="0.2"/>
  <circle cx="1160" cy="130" r="1" fill="#1D9E75" opacity="0.2"/>
  <circle cx="1210" cy="90"  r="1" fill="#1D9E75" opacity="0.15"/>

  <circle cx="100" cy="540" r="2" fill="#1D9E75" opacity="0.3"/>
  <circle cx="120" cy="555" r="1.5" fill="#1D9E75" opacity="0.2"/>
  <circle cx="80"  cy="560" r="1" fill="#1D9E75" opacity="0.2"/>
</svg>
